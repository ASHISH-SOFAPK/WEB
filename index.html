<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASHISH_STUDIO // 2026</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Floating Neon Aura */
        .glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a00, #000); z-index: -1; }
        
        /* Hero Section */
        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-title { font-size: 5rem; font-weight: 800; text-transform: uppercase; letter-spacing: -2px; margin: 0; text-shadow: 0 0 20px #d4af37; }
        
        /* Interactive Cards */
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; padding: 50px; max-width: 1200px; margin: auto; }
        .box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid #333; padding: 40px; border-radius: 30px; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .box:hover { border-color: #d4af37; transform: translateY(-20px) rotate(2deg); box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2); }

        /* Terminal Enquiry */
        .terminal-box { background: #050505; border: 1px solid #d4af37; padding: 50px; margin: 50px auto; max-width: 600px; border-radius: 20px; }
        input, textarea { width: 100%; background: transparent; border: none; border-bottom: 2px solid #333; color: #d4af37; padding: 10px; font-size: 1.2rem; }
        .btn-exec { background: #d4af37; color: #000; padding: 20px; width: 100%; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <header>
        <h1 class="hero-title">ASHISH_</h1>
        <p style="color: #d4af37; font-family: monospace;">// ALGO_TRADING & SYSTEM ARCHITECTURE</p>
    </header>

    <div class="cards">
        <div class="box"><h2>ALGO_TRADING</h2><p>High-frequency MQL5 bots for XAUUSD & Nifty.</p></div>
        <div class="box"><h2>WATSAPP_BOT</h2><p>Advanced messaging & marketing automation.</p></div>
        <div class="box"><h2>APK_SERVICES</h2><p>High-end Android mobile development.</p></div>
        <div class="box"><h2>SOFT_DEVS</h2><p>Scalable business software architecture.</p></div>
    </div>

    <div class="terminal-box">
        <h3 style="color:#d4af37">INITIATE_REQUEST</h3>
        <input type="text" id="name" placeholder="CLIENT_NAME...">
        <textarea id="msg" placeholder="PROJECT_DETAILS..." rows="3"></textarea>
        <button class="btn-exec" onclick="exec()">EXECUTE_MESSAGE</button>
    </div>

    <script>
        function exec() {
            const name = document.getElementById('name').value;
            const msg = document.getElementById('msg').value;
            window.open(`https://wa.me/7530919863?text=Project Request from ${name}: ${msg}`, '_blank');
        }
    </script>
</body>
</html>
