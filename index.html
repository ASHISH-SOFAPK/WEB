<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .name-3d { font-size: clamp(2.5rem, 12vw, 5rem); font-weight: 900; animation: colorChange 5s infinite alternate, float 3s ease-in-out infinite; }
        @keyframes colorChange { 0% { color: #00d4ff; } 50% { color: #ffffff; } 100% { color: #4f46e5; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .float-call { position: fixed; bottom: 30px; right: 30px; background: #007bff; color: white; padding: 20px; border-radius: 50%; box-shadow: 0 10px 25px rgba(0,123,255,0.4); z-index: 1000; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,123,255,0.7); } 70% { box-shadow: 0 0 0 15px rgba(0,123,255,0); } }
    </style>
</head>
