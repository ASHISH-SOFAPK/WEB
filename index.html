<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashish | Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Mobile-friendly 3D Name */
        .name-3d {
            font-size: clamp(2rem, 10vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            animation: colorChange 5s infinite alternate, float 3s ease-in-out infinite;
        }
        @keyframes colorChange { 0% { color: #00d4ff; } 50% { color: #ffffff; } 100% { color: #4f46e5; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .float-call {
            position: fixed; bottom: 30px; right: 30px;
            background: #007bff; color: white; padding: 18px;
            border-radius: 50%; box-shadow: 0 10px 25px rgba(0,123,255,0.4);
            font-size: 20px; z-index: 1000; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,123,255,0.7); } 70% { box-shadow: 0 0 0 15px rgba(0,123,255,0); } }
    </style>
</head>
<body class="p-4">

    <!-- Header -->
    <header class="py-16 text-center">
        <h1 class="name-3d">&lt;ASHISH /&gt;</h1>
        <p class="text-slate-400 mt-2 text-sm md:text-lg">Full-Stack Developer & Automation Expert</p>
    </header>

    <div class="max-w-lg mx-auto">
        
        <!-- Enquiry -->
        <section class="glass p-6 rounded-3xl">
            <h2 class="text-xl font-bold mb-4 text-center text-cyan-400">Let's Build Together</h2>
            <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="grid gap-3">
                <input type="text" name="name" placeholder="Your Name" class="bg-black/50 p-3 rounded-xl border border-gray-700 outline-none focus:border-cyan-400 text-white w-full">
                <textarea name="message" placeholder="Project details..." rows="3" class="bg-black/50 p-3 rounded-xl border border-gray-700 outline-none focus:border-cyan-400 text-white w-full"></textarea>
                <button type="submit" class="bg-gradient-to-r from-cyan-500 to-blue-600 py-3 rounded-xl font-bold text-white">Send Enquiry</button>
            </form>

            <!-- Buttons -->
            <div class="flex flex-col gap-3 mt-6">
                <a href="https://wa.me/917530919863" class="flex items-center justify-center gap-3 bg-green-600 py-3 rounded-xl font-bold hover:bg-green-700 transition w-full">
                    <i class="fab fa-whatsapp"></i> 7530919863
                </a>
                <a href="mailto:ashish95823@gmail.com" class="flex items-center justify-center gap-3 bg-red-600 py-3 rounded-xl font-bold hover:bg-red-700 transition w-full">
                    <i class="fas fa-envelope"></i> Email Me
                </a>
            </div>
        </section>
    </div>

    <!-- Floating Call -->
    <a href="tel:+917530919863" class="float-call">
        <i class="fas fa-phone"></i>
    </a>

</body>
</html>
