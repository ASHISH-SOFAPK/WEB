<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashish | Developer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* 3D Animated Name */
        .name-3d {
            font-size: 4rem;
            font-weight: 800;
            text-transform: uppercase;
            animation: colorChange 5s infinite alternate, float 3s ease-in-out infinite;
            text-shadow: 0 10px 20px rgba(0,212,255,0.3);
        }
        @keyframes colorChange {
            0% { color: #00d4ff; }
            50% { color: #ffffff; }
            100% { color: #4f46e5; }
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Floating Call Button */
        .float-call {
            position: fixed; bottom: 30px; right: 30px;
            background: #007bff; color: white; padding: 20px;
            border-radius: 50%; box-shadow: 0 10px 25px rgba(0,123,255,0.4);
            font-size: 24px; z-index: 1000; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,123,255,0.7); } 70% { box-shadow: 0 0 0 20px rgba(0,123,255,0); } }
    </style>
</head>
<body>

    <!-- Header Section with 3D Name -->
    <header class="p-20 text-center">
        <h1 class="name-3d">&lt;ASHISH /&gt;</h1>
        <p class="text-slate-400 mt-4 text-xl">Full-Stack Developer & Automation Expert</p>
    </header>

    <div class="max-w-3xl mx-auto p-6">
        
        <!-- Enquiry Interface -->
        <section class="glass p-8 rounded-3xl">
            <h2 class="text-2xl font-bold mb-6 text-center text-cyan-400">Let's Build Something Great</h2>
            <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="grid gap-4">
                <input type="text" name="name" placeholder="Your Name" class="bg-black/50 p-4 rounded-xl border border-gray-700 outline-none focus:border-cyan-400 text-white">
                <textarea name="message" placeholder="Describe your project requirements..." rows="3" class="bg-black/50 p-4 rounded-xl border border-gray-700 outline-none focus:border-cyan-400 text-white"></textarea>
                <button type="submit" class="bg-gradient-to-r from-cyan-500 to-blue-600 py-4 rounded-xl font-bold text-white hover:opacity-90">Send Enquiry</button>
            </form>

            <!-- Contact Buttons Area -->
            <div class="flex justify-center gap-6 mt-8">
                <a href="https://wa.me/917530919863" class="flex items-center gap-3 bg-green-600 px-6 py-3 rounded-full font-bold hover:bg-green-700 transition">
                    <i class="fab fa-whatsapp text-xl"></i> 7530919863
                </a>
                <a href="mailto:ashish95823@gmail.com" class="bg-red-600 p-4 rounded-full text-xl hover:bg-red-700 transition">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </section>
    </div>

    <!-- Floating Call Button -->
    <a href="tel:+917530919863" class="float-call">
        <i class="fas fa-phone"></i>
    </a>

</body>
</html>
