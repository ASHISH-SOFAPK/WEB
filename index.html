<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASHISH | Dev Studio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding: 40px; }
        
        /* Chart Box */
        .chart-container { margin: 40px 0; border: 2px solid var(--gold); border-radius: 15px; overflow: hidden; height: 500px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px; border: 1px solid #222; }
        .enquiry { background: rgba(212, 175, 55, 0.05); padding: 50px; border-radius: 25px; margin-top: 60px; text-align: center; border: 1px solid var(--gold); }
        input, textarea { width: 90%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; }
        .submit-btn { background: var(--gold); color: #000; border: none; padding: 18px 50px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--gold);">ASHISH</h1>
    
    <!-- TradingView Chart Widget -->
    <div class="chart-container">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_chart" style="height:100%;width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.widget({
              "autosize": true,
              "symbol": "NSE:NIFTY",
              "interval": "D",
              "timezone": "Asia/Kolkata",
              "theme": "dark",
              "style": "1",
              "locale": "en",
              "toolbar_bg": "#f1f3f6",
              "enable_publishing": false,
              "container_id": "tradingview_chart"
            });
            </script>
        </div>
    </div>

    <div class="grid">
        <div class="card"><i class="fas fa-robot"></i> <h2>Algo Trading</h2><p>High-frequency MQL5/PineScript bots.</p></div>
        <div class="card"><i class="fas fa-mobile-alt"></i> <h2>APK Dev</h2><p>Custom Android applications.</p></div>
        <div class="card"><i class="fab fa-whatsapp"></i> <h2>WhatsApp Bot</h2><p>AI-driven business automation.</p></div>
    </div>

    <div class="enquiry">
        <h2>Initiate Project Connection</h2>
        <input type="text" id="name" placeholder="Your Name" required><br>
        <textarea id="message" placeholder="Describe your project..." rows="4"></textarea><br>
        <button onclick="sendWhatsApp()" class="submit-btn">SEND TO WHATSAPP</button>
    </div>
</div>

<script>
    function sendWhatsApp() {
        const name = document.getElementById('name').value;
        const msg = document.getElementById('message').value;
        window.open(`https://wa.me/7530919863?text=Project Inquiry from ${name}: ${msg}`, '_blank');
    }
</script>
</body>
</html>
