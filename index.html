<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #000; color: #d4af37; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* Glitch Effect on Title */
        .glitch { font-size: 8rem; font-weight: 900; position: relative; text-shadow: 2px 2px #ff00ff; animation: glitch 1s linear infinite; }
        @keyframes glitch { 0% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; } 50% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; } }
        
        /* Interactive Cards */
        .grid-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 50px; }
        .card { width: 300px; height: 350px; border: 2px solid #d4af37; padding: 20px; position: relative; overflow: hidden; transition: 0.5s; }
        .card:hover { background: #d4af37; color: #000; transform: scale(1.05); }
        
        /* Matrix-like Inputs */
        .input-group { max-width: 500px; margin: 50px auto; border-left: 5px solid #d4af37; padding: 20px; }
        input, textarea { width: 100%; background: #111; border: none; border-bottom: 2px solid #d4af37; color: #d4af37; padding: 10px; margin: 10px 0; }
        button { background: #d4af37; color: #000; padding: 20px; width: 100%; border: none; font-weight: bold; cursor: crosshair; }
    </style>
</head>
<body>

<div style="text-align:center; padding-top: 100px;">
    <h1 class="glitch">ASHISH</h1>
    <p>SYSTEM // ARCHITECT // ALGO_TRADER</p>
</div>

<div class="grid-container">
    <div class="card"><h2>ALGO_BOTS</h2><p>Institutional grade latency-free trading automation.</p></div>
    <div class="card"><h2>APK_DEV</h2><p>Next-gen mobile architecture.</p></div>
    <div class="card"><h2>WHATSAPP_BOT</h2><p>AI-Driven business engagement systems.</p></div>
</div>

<div class="input-group">
    <h3>>_ INITIATE_CONNECTION</h3>
    <input type="text" id="name" placeholder="IDENTIFICATION...">
    <textarea id="msg" placeholder="SYSTEM_REQUEST..."></textarea>
    <button onclick="exec()">EXECUTE_REQUEST</button>
</div>

<script>
    function exec() {
        const name = document.getElementById('name').value;
        const msg = document.getElementById('msg').value;
        window.open(`https://wa.me/7530919863?text=Studio_Enquiry_From_${name}: ${msg}`, '_blank');
    }
</script>

</body>
</html>
